<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель Управления Роботом (Сайт №1)</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-size: 22px;
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .subtitle {
            font-size: 13px;
            color: #7f8c8d;
            margin-bottom: 20px;
        }
        .status-box {
            background: #eef2f7;
            padding: 15px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 25px;
            color: #7f8c8d;
            border: 1px solid #dcdde1;
        }
        .status-box.active {
            color: #27ae60;
            background: #e8f8f5;
            border-color: #2ecc71;
        }
        .btn {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(46, 204, 113, 0.2);
        }
        .btn:hover {
            background-color: #27ae60;
        }
        .btn.stop {
            background-color: #e74c3c;
            box-shadow: 0 4px 6px rgba(231, 76, 60, 0.2);
        }
        .btn.stop:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🤖 Управление Генератором</h1>
    <div class="subtitle">Имитация трафика маркетплейса на Сайт №2</div>
    
    <div class="status-box" id="statusLabel">Проверка статуса...</div>
    <button class="btn" id="actionBtn">Загрузка...</button>
</div>

<script src="script.js"></script>
</body>
</html>
