<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>САЙТ 1 - Регистратор</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #1e1e24; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; }
        .card { background: #2a2a35; padding: 25px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); text-align: center; }
        h2 { margin-bottom: 10px; color: #4caf50; }
        p { color: #aaaaaa; font-size: 14px; margin-bottom: 20px; }
        .status-badge { display: inline-flex; align-items: center; gap: 6px; background: #222; padding: 6px 12px; border-radius: 20px; font-size: 12px; margin-bottom: 20px; }
        .dot { width: 8px; height: 8px; background: #4caf50; border-radius: 50%; box-shadow: 0 0 8px #4caf50; }
        .btn { background: #4caf50; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn:disabled { background: #555; cursor: not-allowed; }
        .log-box { background: #111; margin-top: 20px; padding: 10px; border-radius: 6px; height: 180px; overflow-y: auto; text-align: left; font-family: monospace; font-size: 12px; border: 1px solid #333; }
        .log-entry { margin-bottom: 6px; border-bottom: 1px solid #222; padding-bottom: 4px; }
        .log-success { color: #4caf50; }
        .log-info { color: #00bcd4; }
    </style>
</head>
<body>

<div class="card">
    <h2>ГОСТЕВОЙ САЙТ 1</h2>
    <p>Эмуляция регистрации и оплаты 10 000 р.</p>
    
    <div class="status-badge">
        <div class="dot"></div>
        <span>Робот-автомат (3 сек)</span>
    </div>

    <button id="robotBtn" class="btn">Включить Робота</button>

    <div class="log-box" id="logBox">
        <div class="log-entry log-info">[Система]: Готов к запуску стресс-теста...</div>
    </div>
</div>

<script>
    const logBox = document.getElementById('logBox');
    const robotBtn = document.getElementById('robotBtn');
    
    let robotInterval = null;
    let isRobotActive = false;

    // Ссылка на ТВОЙ бэкенд Сайта 1 на Render
    const BACKEND_URL = 'https://site-1-registrar.onrender.com/api/pay-and-register';

    function addLog(text, type = 'info') {
        const entry = document.createElement('div');
        entry.className = `log-entry log-${type}`;
        entry.innerText = `[${new Date().toLocaleTimeString()}] ${text}`;
        logBox.insertBefore(entry, logBox.firstChild);
    }

    // Генератор случайных логинов
    function generateRandomLogin() {
        const letters = 'abcdefghijklmnopqrstuvwxyz';
        let result = 'user_';
        for (let i = 0; i < 5; i++) {
            result += letters.charAt(Math.floor(Math.random() * letters.length));
        }
        return result + Math.floor(100 + Math.random() * 900);
    }

    async function sendRegistration() {
        const fakeLogin = generateRandomLogin();
        addLog(`Генерация: ${fakeLogin}. Оплата 10 000р...`, 'info');

        try {
            const response = await fetch(BACKEND_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ login: fakeLogin })
            });

            const result = await response.json();

            if (result.success) {
                addLog(`Успех! ${fakeLogin} отправлен на Сайт 2 в ячейку ${result.data.cell}`, 'success');
            } else {
                addLog(`Ошибка сервера: ${result.error}`, 'info');
            }
        } catch (error) {
            addLog(`Ошибка сети. Проверь деплой бэкенда.`, 'info');
        }
    }

    robotBtn.addEventListener('click', () => {
        if (isRobotActive) {
            clearInterval(robotInterval);
            robotBtn.innerText = 'Включить Робота';
            robotBtn.style.background = '#4caf50';
            addLog('Робот остановлен юзером.');
            isRobotActive = false;
        } else {
            isRobotActive = true;
            robotBtn.innerText = 'Остановить Робота';
            robotBtn.style.background = '#f44336';
            addLog('Робот запущен. Интервал 3 сек.');
            
            // Первая отправка сразу
            sendRegistration();
            // Погнал цикл
            robotInterval = setInterval(sendRegistration, 3000);
        }
    });
</script>

</body>
</html>
