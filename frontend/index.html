<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Публичный Регистратор (Сайт №1)</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-size: 20px;
            color: #2c3e50;
            margin-bottom: 20px;
        }
        .status-box {
            background: #eef2f7;
            padding: 15px;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 20px;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }
        .btn:hover {
            background-color: #2980b9;
        }
        .log-container {
            margin-top: 20px;
            text-align: left;
            max-height: 180px;
            overflow-y: auto;
            background: #2c3e50;
            color: #ecf0f1;
            padding: 10px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 12px;
        }
        .log-entry {
            margin-bottom: 4px;
            border-bottom: 1px solid #34495e;
            padding-bottom: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🤖 Робот-Регистратор (Сайт 1)</h1>
    <div class="status-box" id="status">Автомат остановлен</div>
    <button class="btn" id="startBtn">Запустить регистрацию</button>
    
    <div class="log-container" id="logs">
        <div class="log-entry">> Ожидание запуска...</div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
